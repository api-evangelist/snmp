aid: snmp
name: SNMP
description: >-
  Simple Network Management Protocol (SNMP) is the foundational IETF standard
  for monitoring and managing network devices. SNMP defines a request/response
  protocol over UDP (ports 161 and 162) for retrieving and altering management
  variables exposed by agents on routers, switches, servers, UPSs, and other
  equipment, plus an asynchronous trap/notification channel for event delivery.
  The protocol family spans three major generations — SNMPv1 (RFC 1157),
  SNMPv2c (RFC 1901-1908), and the modular SNMPv3 architecture
  (RFC 3411-3418, extended by RFC 7860 for HMAC-SHA-2 authentication) — and is
  paired with the Structure of Management Information (SMI) and a vast catalog
  of MIB modules, most notably the IF-MIB (RFC 2863) for network interfaces.
  SNMP remains the lingua franca of network monitoring, consumed primarily by
  NMS platforms such as Nagios, Zabbix, PRTG, SolarWinds, LibreNMS, and
  Observium, and implemented in open source primarily by the Net-SNMP suite.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
